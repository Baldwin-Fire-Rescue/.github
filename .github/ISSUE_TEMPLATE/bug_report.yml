name: Bug report
description: Something is broken or behaves unexpectedly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report! Please fill out the sections below so the issue can be reproduced.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduce
      description: A minimal example. Ideally a small script plus the exact commands you ran.
      placeholder: |
        # paste minimal repro here
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "Version / commit"
      description: "Version tag you installed, or the commit SHA you built from."
      placeholder: "v0.1.0 or a1b2c3d"
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      description: "Language runtime you're using — e.g. `python --version`, `node --version`."

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Linux / macOS / Windows + version"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any stack trace, error message, or unexpected output.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help.
